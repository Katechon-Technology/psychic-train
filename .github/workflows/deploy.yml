name: deploy

on:
  push:
    branches: [master]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      game: ${{ steps.filter.outputs.game }}
      stream: ${{ steps.filter.outputs.stream }}
      base: ${{ steps.filter.outputs.stream-client-base }}
      images: ${{ steps.compute.outputs.images }}
      dependent: ${{ steps.compute.outputs.dependent }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # `game` / `stream` gate the deploy jobs.
          # The remaining filters are named after the image they trigger; each
          # filter lists every path that should rebuild that image (its own
          # source AND any base image it FROMs). The `compute` step below
          # turns the list of matched filters into the build matrix.
          filters: |
            game:
              - 'packages/broker/**'
              - 'packages/frontend/**'
              - 'plugins/**/agent/**'
              - 'plugins/**/environment/**'
              - 'plugins/**/manifest.yaml'
              - 'machines/game-server/**'
            stream:
              - 'packages/stream-agent/**'
              - 'packages/stream-client-base/**'
              - 'packages/vtuber-overlay/**'
              - 'plugins/**/stream-client/**'
              - 'machines/stream-server/**'

            stream-client-base:
              - 'packages/stream-client-base/**'

            broker:
              - 'packages/broker/**'
            frontend:
              - 'packages/frontend/**'
            stream-agent:
              - 'packages/stream-agent/**'
            vtuber-overlay:
              - 'packages/vtuber-overlay/**'

            factorio-agent:
              - 'plugins/factorio/agent/**'
            factorio-stream-client:
              - 'plugins/factorio/stream-client/**'
              - 'packages/stream-client-base/**'

            minecraft-env:
              - 'plugins/minecraft/environment/**'
            minecraft-agent:
              - 'plugins/minecraft/agent/**'
            minecraft-stream-client:
              - 'plugins/minecraft/stream-client/**'
              - 'packages/stream-client-base/**'

            playwright-browser-agent:
              - 'plugins/playwright-browser/agent/**'
            playwright-browser-stream-client:
              - 'plugins/playwright-browser/stream-client/**'
              - 'packages/stream-client-base/**'

            arcade-stream-client:
              - 'plugins/arcade/stream-client/**'
              - 'plugins/playwright-browser/stream-client/**'
              - 'packages/stream-client-base/**'

      - id: compute
        env:
          CHANGES: ${{ steps.filter.outputs.changes }}
        run: |
          # Hardcoded image metadata. The `compute` step below intersects this
          # with the list of paths-filter outputs that matched.
          cat > /tmp/all-images.json <<'EOF'
          {
            "matrix": [
              {"name":"broker",                            "context":"packages/broker"},
              {"name":"frontend",                          "context":"packages/frontend"},
              {"name":"stream-agent",                      "context":"packages/stream-agent"},
              {"name":"vtuber-overlay",                    "context":".",                              "dockerfile":"packages/vtuber-overlay/Dockerfile"},
              {"name":"factorio-agent",                    "context":"plugins/factorio/agent"},
              {"name":"factorio-stream-client",            "context":"plugins/factorio/stream-client"},
              {"name":"minecraft-env",                     "context":"plugins/minecraft/environment"},
              {"name":"minecraft-agent",                   "context":"plugins/minecraft/agent"},
              {"name":"minecraft-stream-client",           "context":"plugins/minecraft/stream-client"},
              {"name":"playwright-browser-agent",          "context":"plugins/playwright-browser/agent"},
              {"name":"playwright-browser-stream-client",  "context":"plugins/playwright-browser/stream-client"}
            ],
            "dependent": [
              {"name":"arcade-stream-client", "context":"plugins", "dockerfile":"plugins/arcade/stream-client/Dockerfile", "depends_on":"playwright-browser-stream-client"}
            ]
          }
          EOF

          echo "matched filters: $CHANGES"

          MATRIX=$(jq -c --argjson changes "$CHANGES" \
            '.matrix    | map(select(.name as $n | $changes | index($n)))' /tmp/all-images.json)
          DEPENDENT=$(jq -c --argjson changes "$CHANGES" \
            '.dependent | map(select(.name as $n | $changes | index($n)))' /tmp/all-images.json)

          echo "matrix:    $MATRIX"
          echo "dependent: $DEPENDENT"

          echo "images=$MATRIX"        >> "$GITHUB_OUTPUT"
          echo "dependent=$DEPENDENT"  >> "$GITHUB_OUTPUT"

  build-base:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.base == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push stream-client-base
        uses: docker/build-push-action@v6
        with:
          context: packages/stream-client-base
          push: true
          tags: ghcr.io/katechon-technology/psychic-train-stream-client-base:latest

  build:
    needs: [detect-changes, build-base]
    # Always-skipped build-base (when base didn't change) shouldn't block this.
    if: |
      always() &&
      (needs.build-base.result == 'success' || needs.build-base.result == 'skipped') &&
      needs.detect-changes.outputs.images != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.images) }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull stream-client-base for dependent images
        run: |
          docker pull ghcr.io/katechon-technology/psychic-train-stream-client-base:latest
          docker tag  ghcr.io/katechon-technology/psychic-train-stream-client-base:latest psychic-train/stream-client-base:latest

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile || format('{0}/Dockerfile', matrix.context) }}
          push: true
          tags: ghcr.io/katechon-technology/psychic-train-${{ matrix.name }}:latest

  # Second-stage builds for images that FROM another image in the matrix above.
  # arcade-stream-client COPYs assets out of playwright-browser-stream-client,
  # so it has to wait for the matrix to finish and pull both base images.
  build-dependent:
    needs: [detect-changes, build]
    if: |
      always() &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      needs.detect-changes.outputs.dependent != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.dependent) }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull base images this build FROMs
        run: |
          docker pull ghcr.io/katechon-technology/psychic-train-stream-client-base:latest
          docker tag  ghcr.io/katechon-technology/psychic-train-stream-client-base:latest psychic-train/stream-client-base:latest
          docker pull ghcr.io/katechon-technology/psychic-train-${{ matrix.depends_on }}:latest
          docker tag  ghcr.io/katechon-technology/psychic-train-${{ matrix.depends_on }}:latest psychic-train/${{ matrix.depends_on }}:latest

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile || format('{0}/Dockerfile', matrix.context) }}
          push: true
          tags: ghcr.io/katechon-technology/psychic-train-${{ matrix.name }}:latest

  deploy-game:
    needs: [detect-changes, build, build-dependent]
    if: |
      always() &&
      needs.detect-changes.outputs.game == 'true' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      (needs.build-dependent.result == 'success' || needs.build-dependent.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Pull images, sync repo, restart
        timeout-minutes: 10
        run: |
          ssh -o ServerAliveInterval=10 -o ServerAliveCountMax=6 root@${{ secrets.GAME_SERVER_HOST }} bash -s << 'ENDSSH'
            set -euo pipefail
            git -C /opt/psychic-train fetch origin master
            git -C /opt/psychic-train reset --hard origin/master

            REGISTRY=ghcr.io/katechon-technology

            # Compose-managed services (retagged to match IMAGE_REGISTRY= in .env)
            for name in broker frontend; do
              docker pull $REGISTRY/psychic-train-${name}:latest
              docker tag  $REGISTRY/psychic-train-${name}:latest psychic-train-${name}:latest
            done

            # On-demand plugin images spawned by the broker (manifest naming convention)
            for name in factorio-agent minecraft-env minecraft-agent playwright-browser-agent; do
              docker pull $REGISTRY/psychic-train-${name}:latest
              docker tag  $REGISTRY/psychic-train-${name}:latest psychic-train/${name}:latest
            done

            # Reap broker-spawned containers so new sessions use updated images
            docker ps -q --filter name=env- --filter name=agent- | xargs -r docker rm -f || true

            cd /opt/psychic-train/machines/game-server
            docker compose up -d --remove-orphans
          ENDSSH

  deploy-stream:
    needs: [detect-changes, build, build-dependent]
    if: |
      always() &&
      needs.detect-changes.outputs.stream == 'true' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      (needs.build-dependent.result == 'success' || needs.build-dependent.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Pull images, sync repo, restart
        timeout-minutes: 10
        run: |
          ssh -o ServerAliveInterval=10 -o ServerAliveCountMax=6 root@${{ secrets.STREAM_SERVER_HOST }} bash -s << 'ENDSSH'
            set -euo pipefail
            git -C /opt/psychic-train fetch origin master
            git -C /opt/psychic-train reset --hard origin/master

            REGISTRY=ghcr.io/katechon-technology

            # Compose-managed service
            docker pull $REGISTRY/psychic-train-stream-agent:latest
            docker tag  $REGISTRY/psychic-train-stream-agent:latest psychic-train-stream-agent:latest

            # On-demand stream-client images spawned by stream-agent
            for name in stream-client-base vtuber-overlay \
                        factorio-stream-client minecraft-stream-client \
                        playwright-browser-stream-client \
                        arcade-stream-client; do
              docker pull $REGISTRY/psychic-train-${name}:latest
              docker tag  $REGISTRY/psychic-train-${name}:latest psychic-train/${name}:latest
            done

            # Reap any running stream-client containers (broker-spawned, not
            # compose-managed). Do NOT match name=vtuber- here — that would
            # also kill the persistent compose-managed vtuber-overlay and
            # force YouTube to reconnect (re-Go-Live) on every deploy.
            docker ps -q --filter name=stream-client- | xargs -r docker rm -f || true

            cd /opt/psychic-train/machines/stream-server
            docker compose up -d --remove-orphans
          ENDSSH
