# Production game-server stack. No NixOS — host provisioning is external.
#
# Assumes /opt/psychic-train/plugins/ exists on the host and is synced by CI.
# Pre-built images come from a registry or are built by machines/game-server/deploy.sh.

name: psychic_train

networks:
  default:
    name: psychic_train_net

volumes:
  postgres_data:
  redis_data:
  psychic_train_minecraft_server:
  caddy_data:
  caddy_config:

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - FRONTEND_DOMAIN=${FRONTEND_DOMAIN}
      - BROKER_DOMAIN=${BROKER_DOMAIN}
      # Used by the /demo-avatar/* handler on FRONTEND_DOMAIN to reach
      # the stream-server's vtuber-overlay container.
      - AVATAR_BACKEND_URL=${AVATAR_BACKEND_URL}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: psychic_train
      POSTGRES_USER: psychic_train
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  broker:
    build:
      context: /opt/psychic-train/packages/broker
    image: ${IMAGE_REGISTRY:-}psychic-train-broker:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on: [postgres, redis]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: psychic_train
      POSTGRES_USER: psychic_train
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      PLUGINS_DIR: /plugins
      BROKER_ADMIN_KEY: ${BROKER_ADMIN_KEY}
      BROKER_URL: ${BROKER_URL}
      DOCKER_NETWORK: psychic_train_net
      STREAM_BASE_PORT: "3003"
      STREAM_PUBLIC_HOST: ${STREAM_PUBLIC_HOST}
      STREAM_SCHEME: ${STREAM_SCHEME:-https}
      STREAM_DOMAIN: ${STREAM_DOMAIN}
      STREAM_AGENT_URL: ${STREAM_AGENT_URL}
      STREAM_AGENT_KEY: ${STREAM_AGENT_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MODEL: ${MODEL:-claude-sonnet-4-5-20250929}
      RCON_PASSWORD: ${RCON_PASSWORD}
      GAME_SERVER_PUBLIC_HOST: ${GAME_SERVER_PUBLIC_HOST:-}
      YOUTUBE_STREAM_KEY: ${YOUTUBE_STREAM_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      NARRATION_MODEL: ${NARRATION_MODEL:-claude-haiku-4-5-20251001}
      VTUBER_OVERLAY_IMAGE: ${VTUBER_OVERLAY_IMAGE:-psychic-train/vtuber-overlay:latest}
    volumes:
      - /opt/psychic-train/plugins:/plugins:ro
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    build:
      context: /opt/psychic-train/packages/frontend
    image: ${IMAGE_REGISTRY:-}psychic-train-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on: [broker]
    environment:
      BROKER_URL: http://broker:8080
      BROKER_ADMIN_KEY: ${BROKER_ADMIN_KEY}
      # /demo browser-side avatar — Next.js rewrites /demo-avatar/* to
      # this URL server-side. Must be reachable from the game-server
      # (not from the visitor's browser); a public stream-server URL
      # (e.g. https://vtuber.<STREAM_DOMAIN>) is the standard choice.
      AVATAR_BACKEND_URL: ${AVATAR_BACKEND_URL:-}
      # /demo voice + Kat agent
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_VOICE_ID: ${VOICE_ID:-jqcCZkN6Knx8BJ5TBdYR}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
