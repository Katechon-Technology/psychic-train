<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>psychic-train overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; background: #000; }

    /* Plugin HLS stream — full canvas. Rendered via a <video> element + hls.js
       so we don't need nested iframe / CORS dance. */
    #source-video {
      position: absolute; top: 0; left: 0;
      width: 1920px; height: 1080px; z-index: 1; object-fit: contain; background: #000;
    }

    /* Avatar iframe — a simple bottom-right rectangle. All the
       "only the head pokes up" positioning is done inside embed.html
       with a CSS transform on the Live2D <canvas> so the model
       itself — not this iframe — is what's positioned. */
    #avatar-container {
      position: absolute;
      bottom: 0; right: 20px;
      width: 600px; height: 400px;
      overflow: hidden;
      z-index: 10;
      pointer-events: none;
    }
    #avatar-frame {
      width: 100%; height: 100%;
      border: none;
      background: transparent;
    }
  </style>
  <script src="/hls.min.js"></script>
</head>
<body>
  <video id="source-video" autoplay muted playsinline></video>
  <div id="avatar-container">
    <iframe id="avatar-frame" src="http://localhost:12393/embed.html" allow="autoplay"></iframe>
  </div>

  <script>
    // Persistent vtuber design: this page is loaded ONCE at container boot
    // and stays open forever. We poll the broker for which session is
    // currently flagged livestream_status="on" and swap hls.js source on
    // change. The main FFmpeg + RTMP downstream of this <video> element
    // never restart — YouTube stays connected across session swaps.
    const BROKER_URL = '${BROKER_URL}';
    const POLL_MS = 3000;

    const v = document.getElementById('source-video');
    let currentUrl = null;
    let hls = null;

    function setSource(url) {
      if (url === currentUrl) return;
      currentUrl = url;
      console.log('[wrapper] swap source ->', url || '(none)');
      if (hls) { try { hls.destroy(); } catch (e) {} hls = null; }
      v.removeAttribute('src');
      v.load();
      if (!url) return; // standby — leave the <video> blank for now

      if (window.Hls && Hls.isSupported()) {
        hls = new Hls({ liveSyncDurationCount: 3, maxBufferLength: 20 });
        hls.loadSource(url);
        hls.attachMedia(v);
        hls.on(Hls.Events.MANIFEST_PARSED, () => v.play().catch(() => {}));
        hls.on(Hls.Events.ERROR, (_, d) => {
          if (d.fatal && currentUrl === url) {
            console.warn('[wrapper] fatal hls error, retrying in 3s', d);
            setTimeout(() => { if (currentUrl === url) { hls.loadSource(url); } }, 3000);
          }
        });
      } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
        v.src = url;
        v.addEventListener('loadedmetadata', () => v.play().catch(() => {}), { once: true });
      }
    }

    async function pollSource() {
      try {
        const r = await fetch(BROKER_URL.replace(/\/$/, '') + '/api/stream/current-source', { cache: 'no-store' });
        if (!r.ok) return;
        const data = await r.json();
        setSource(data.url || null);
      } catch (e) {
        console.warn('[wrapper] poll failed', e);
      }
    }

    pollSource();
    setInterval(pollSource, POLL_MS);

    // Avatar iframe needs an enable-audio postMessage to unlock its AudioContext
    // (see patches/embed.html for the listener).
    const avatar = document.getElementById('avatar-frame');
    const pingAvatar = () => {
      try { avatar.contentWindow?.postMessage({ type: 'enable-audio' }, '*'); } catch {}
    };
    avatar.addEventListener('load', () => {
      pingAvatar();
      let n = 0;
      const id = setInterval(() => { pingAvatar(); if (++n >= 20) clearInterval(id); }, 1000);
    });
  </script>
</body>
</html>
