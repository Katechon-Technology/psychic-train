# Dev stack for psychic-train.
#
# Runs long-lived services (postgres, redis, broker, frontend) and builds all
# on-demand images (stream-client-base + per-plugin agent/env/stream-client) so
# the broker can spawn them via `docker run`. Tear-down details and gotchas:
#
#   docker compose -f dev/docker-compose.yml down -v
#   docker ps --filter name=env- --filter name=agent- --filter name=stream-client- -q \
#     | xargs -r docker rm -f     # reap anything the broker spawned outside compose

name: psychic_train

networks:
  default:
    name: psychic_train_net

volumes:
  postgres_data:
  redis_data:
  # Explicit `name:` overrides — otherwise compose prefixes volumes with the
  # project name (`psychic_train_psychic_train_minecraft_server`), which doesn't
  # match the un-prefixed names the broker spawns containers with via the
  # plugin manifests.
  psychic_train_minecraft_server:
    name: psychic_train_minecraft_server
  # Holds the Minecraft client jars + libraries + ~3,800 asset objects that
  # the minecraft-stream-client (and arcade-stream-client) Java process loads
  # at boot. Populated from plugin-data/minecraft/ via minecraft-client-init.
  psychic_train_minecraft_client:
    name: psychic_train_minecraft_client
  psychic_train_factorio_client:
    name: psychic_train_factorio_client

services:
  # ---------------- long-lived services ----------------

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: psychic_train
      POSTGRES_USER: psychic_train
      POSTGRES_PASSWORD: psychic_train_secret_123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "psychic_train"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no"]
    volumes:
      - redis_data:/data

  broker:
    build:
      context: ../packages/broker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: psychic_train
      POSTGRES_USER: psychic_train
      POSTGRES_PASSWORD: psychic_train_secret_123
      REDIS_HOST: redis
      PLUGINS_DIR: /plugins
      BROKER_ADMIN_KEY: ${BROKER_ADMIN_KEY:-dev}
      BROKER_URL: http://broker:8080
      DOCKER_NETWORK: psychic_train_net
      STREAM_BASE_PORT: "3003"
      STREAM_PUBLIC_HOST: localhost
      STREAM_SCHEME: http
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MODEL: ${MODEL:-claude-sonnet-4-5-20250929}
      RCON_PASSWORD: ${RCON_PASSWORD:-psychic_train_rcon}
      # VTuber overlay
      VTUBER_OVERLAY_IMAGE: psychic-train/vtuber-overlay:latest
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      NARRATION_MODEL: ${NARRATION_MODEL:-claude-haiku-4-5-20251001}
      YOUTUBE_STREAM_KEY: ${YOUTUBE_STREAM_KEY:-}
      GAME_SERVER_PUBLIC_HOST: ${GAME_SERVER_PUBLIC_HOST:-}
    volumes:
      - ../plugins:/plugins:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
      # Reserve a range for stream-client containers the broker spawns with
      # `-p STREAM_BASE_PORT+slot:3000`. Docker Desktop handles per-container
      # port exposure on spawn, so nothing to pre-publish here.

  frontend:
    build:
      context: ../packages/frontend
    depends_on:
      - broker
    environment:
      BROKER_URL: http://broker:8080
      BROKER_ADMIN_KEY: ${BROKER_ADMIN_KEY:-dev}
      # /demo route — voice + Kat agent + browser-side avatar embed
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_VOICE_ID: ${VOICE_ID:-jqcCZkN6Knx8BJ5TBdYR}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      NEXT_PUBLIC_AVATAR_URL: ${NEXT_PUBLIC_AVATAR_URL:-http://localhost:12393}
    ports:
      - "3000:3000"

  # The persistent vtuber-overlay. Polls broker for which session is currently
  # flagged livestream_status="on" and overlays its HLS. RTMP push to YouTube is
  # kicked off ONCE at boot so YouTube only needs Go Live one time.
  #
  # Gated behind the `vtuber` profile so plain `docker compose up` doesn't auto-
  # start it in dev (TTS+narration cost real money on every session). Bring it
  # up explicitly with:
  #     docker compose --profile vtuber up -d vtuber-overlay
  # `docker compose build vtuber-overlay` still works regardless (explicit
  # service positional arg overrides profile filtering).
  vtuber-overlay:
    build:
      context: ..
      dockerfile: packages/vtuber-overlay/Dockerfile
    image: psychic-train/vtuber-overlay:latest
    profiles: ["vtuber"]
    depends_on:
      - broker
    restart: unless-stopped
    environment:
      BROKER_URL: http://broker:8080
      BROKER_API_KEY: ${BROKER_ADMIN_KEY:-dev}
      YOUTUBE_STREAM_KEY: ${YOUTUBE_STREAM_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      NARRATION_MODEL: ${NARRATION_MODEL:-claude-haiku-4-5-20251001}
      CHARACTER_NAME: ${CHARACTER_NAME:-Kat}
      LIVE2D_MODEL: ${LIVE2D_MODEL:-mao_pro}
      VOICE_ID: ${VOICE_ID:-jqcCZkN6Knx8BJ5TBdYR}
      PERSONA_PROMPT: ${PERSONA_PROMPT:-}
      # 0 (default): only Open-LLM-VTuber on :12393 + narrator run; the
      # /demo route iframes :12393/embed.html browser-side, no compositing.
      # 1: opens Chromium on wrapper.html, captures it via FFmpeg → HLS on
      # :3000 → optional RTMP push if YOUTUBE_STREAM_KEY is set.
      ENABLE_RECORDING: ${ENABLE_RECORDING:-0}
    ports:
      - "3050:3000"
      # Open-LLM-VTuber web UI — iframed by /demo as the avatar overlay.
      - "12393:12393"

  # ---------------- build-only images (spawned on demand by broker) ----------------

  stream-client-base:
    build:
      context: ../packages/stream-client-base
    image: psychic-train/stream-client-base:latest
    profiles: ["build"]
    command: ["true"]

  stream-agent:
    build:
      context: ../packages/stream-agent
    image: psychic-train-stream-agent:latest
    profiles: ["build"]
    command: ["true"]

  factorio-agent:
    build:
      context: ../plugins/factorio/agent
    image: psychic-train/factorio-agent:latest
    profiles: ["build"]
    command: ["true"]

  factorio-stream-client:
    build:
      context: ../plugins/factorio/stream-client
    image: psychic-train/factorio-stream-client:latest
    depends_on: [stream-client-base]
    profiles: ["build"]
    command: ["true"]

  playwright-browser-agent:
    build:
      context: ../plugins/playwright-browser/agent
    image: psychic-train/playwright-browser-agent:latest
    profiles: ["build"]
    command: ["true"]

  playwright-browser-stream-client:
    build:
      context: ../plugins/playwright-browser/stream-client
    image: psychic-train/playwright-browser-stream-client:latest
    depends_on: [stream-client-base]
    profiles: ["build"]
    command: ["true"]

  minecraft-env:
    build:
      context: ../plugins/minecraft/environment
    image: psychic-train/minecraft-env:latest
    profiles: ["build"]
    command: ["true"]

  minecraft-agent:
    build:
      context: ../plugins/minecraft/agent
    image: psychic-train/minecraft-agent:latest
    profiles: ["build"]
    command: ["true"]

  minecraft-stream-client:
    build:
      context: ../plugins/minecraft/stream-client
    image: psychic-train/minecraft-stream-client:latest
    depends_on: [stream-client-base]
    profiles: ["build"]
    command: ["true"]

  desktop-agent:
    build:
      context: ../plugins/desktop/agent
    image: psychic-train/desktop-agent:latest
    profiles: ["build"]
    command: ["true"]

  desktop-stream-client:
    build:
      context: ../plugins/desktop/stream-client
    image: psychic-train/desktop-stream-client:latest
    depends_on: [stream-client-base]
    profiles: ["build"]
    command: ["true"]

  # The arcade stream-client COPYs assets out of the playwright-browser and
  # minecraft plugins (vendored fastify server, MC download script) so its
  # build context is the parent `plugins/` directory rather than its own
  # subdirectory. Pattern borrowed from vtuber-overlay above.
  arcade-playwright-agent:
    build:
      context: ../plugins/arcade/agent-playwright
    image: psychic-train/arcade-playwright-agent:latest
    profiles: ["build"]
    command: ["true"]

  arcade-stream-client:
    build:
      context: ../plugins
      dockerfile: arcade/stream-client/Dockerfile
    image: psychic-train/arcade-stream-client:latest
    # COPYs the /pw-browser tree + Playwright Chromium cache out of
    # playwright-browser-stream-client at build time (avoids re-downloading
    # Playwright's Chromium on every arcade rebuild). MC client jars/assets
    # arrive at runtime via the psychic_train_minecraft_client volume mount,
    # NOT baked at build time.
    depends_on:
      - stream-client-base
      - playwright-browser-stream-client
    profiles: ["build"]
    command: ["true"]

  # ---------------- one-shot volume seeders ----------------

  minecraft-server-init:
    # Copies plugins/minecraft/server/ into the named volume the minecraft-env
    # container mounts. Modeled after claudetorio's factorio-client-init.
    # Run with: docker compose run --rm minecraft-server-init
    image: alpine:3.20
    profiles: ["init"]
    volumes:
      - ../plugins/minecraft/server:/src:ro
      - psychic_train_minecraft_server:/dst
    command: >
      sh -c "cp -a /src/. /dst/ && echo 'minecraft-server volume seeded'"

  minecraft-client-init:
    # Copies plugin-data/minecraft/ (host-populated; see
    # plugin-data/minecraft/README.md) into the named volume that both
    # minecraft-stream-client and arcade-stream-client mount at /opt/mc-data.
    # Run with: docker compose --profile init run --rm minecraft-client-init
    #
    # This replaces the old build-time download_mc.sh step. Mojang's CDN is
    # too slow + flaky to fetch ~500MB of jars + assets on every Dockerfile
    # rebuild, so we keep the data on the host and copy it into a runtime
    # volume once.
    image: alpine:3.20
    profiles: ["init"]
    volumes:
      - ../plugin-data/minecraft:/src:ro
      - psychic_train_minecraft_client:/dst
    command: >
      sh -c "
        if [ ! -f /src/versions/1.21.1/1.21.1.json ]; then
          echo 'plugin-data/minecraft/ looks empty. See plugin-data/minecraft/README.md to populate it.';
          exit 1;
        fi;
        cp -a /src/. /dst/ &&
        echo 'minecraft-client volume seeded ('$$(du -sh /dst 2>/dev/null | cut -f1)')'
      "

  factorio-client-init:
    # Copies plugins/factorio/factorio-client/ into the named volume that the
    # factorio stream-client mounts at /opt/factorio at spawn time. Keeps the
    # Factorio install out of the image so rebuilds are fast and the image is
    # tiny. Run with: docker compose run --rm factorio-client-init
    image: alpine:3.20
    profiles: ["init"]
    volumes:
      - ../plugins/factorio/factorio-client:/src:ro
      - psychic_train_factorio_client:/dst
    command: >
      sh -c "cp -a /src/. /dst/ 2>/dev/null; echo 'factorio-client volume seeded ('$(du -sh /dst 2>/dev/null | cut -f1)')'"
